version: '3.8'

services:
  price-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indi-price-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=default
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
